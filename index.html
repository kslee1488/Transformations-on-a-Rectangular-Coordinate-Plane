<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transformations on a Rectangular Coordinate Plane</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel for parsing JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- ICON HELPER COMPONENT (Replacing lucide-react) ---
    const iconPaths = {
      Settings2: <><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="7" r="3"/><circle cx="8" cy="17" r="3"/></>,
      Move: <><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="19 9 22 12 19 15"/><polyline points="9 19 12 22 15 19"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></>,
      FlipHorizontal: <><path d="M8 3H5a2 2 0 0 0-2 2v14c0 1.1.9 2 2 2h3"/><path d="M16 3h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-3"/><path d="M12 20v2"/><path d="M12 14v2"/><path d="M12 8v2"/><path d="M12 2v2"/></>,
      RotateCcw: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></>,
      Info: <><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></>,
      Shuffle: <><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></>,
      CheckCircle2: <><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>,
      XCircle: <><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></>,
      User: <><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
      Trophy: <><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7c0 6 3 10 6 10s6-4 6-10z"/></>,
      ArrowRight: <><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></>,
      Compass: <><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></>,
      GraduationCap: <><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></>,
      Lightbulb: <><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></>
    };

    const Icon = ({ name, className = "w-6 h-6", ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
        {iconPaths[name]}
      </svg>
    );

    const CoordinateTransformations = () => {
      // --- COMMON SETTINGS & HELPERS ---
      const gridSize = 20; // Changed to 20 to constrain axes strictly from -10 to 10
      const svgSize = 600;
      const unit = svgSize / gridSize;
      const center = svgSize / 2;

      const toSvgX = (mathX) => center + mathX * unit;
      const toSvgY = (mathY) => center - mathY * unit;
      const toMathX = (svgX) => (svgX - center) / unit;
      const toMathY = (svgY) => (center - svgY) / unit;

      // --- APP STATE ---
      const [mainView, setMainView] = useState('explorer'); // 'explorer', 'quiz'

      // --- EXPLORER STATE ---
      const [explorerMode, setExplorerMode] = useState('translation');
      const [originalPoints, setOriginalPoints] = useState([
        { id: 'A', x: 2, y: 2 },
        { id: 'B', x: 6, y: 2 },
        { id: 'C', x: 4, y: 7 }
      ]);
      const [explorerDraggingPoint, setExplorerDraggingPoint] = useState(null);
      
      // Explorer Transformation Params
      const [tx, setTx] = useState(0);
      const [ty, setTy] = useState(0);
      const [reflectAxis, setReflectAxis] = useState('x'); // 'x', 'y', 'y=h', 'x=k'
      const [reflectH, setReflectH] = useState(2); 
      const [reflectK, setReflectK] = useState(2); 
      const [rotationAngle, setRotationAngle] = useState(0); 
      const [rotationDirection, setRotationDirection] = useState('ccw'); 

      // --- QUIZ STATE ---
      const [quizAppState, setQuizAppState] = useState('intro'); // 'intro', 'playing', 'feedback'
      const [playerName, setPlayerName] = useState('');
      const [score, setScore] = useState(0);
      const [attempts, setAttempts] = useState(0);
      const [quizMode, setQuizMode] = useState('mixed'); 
      const [question, setQuestion] = useState(null); 
      const [guessPoint, setGuessPoint] = useState({ x: 0, y: 0 });
      const [isCorrect, setIsCorrect] = useState(false);
      const [isQuizDragging, setIsQuizDragging] = useState(false);
      const [animStep, setAnimStep] = useState(0); // 0: Start, 1: Horizontal Move, 2: Vertical Move (or direct for others)
      const [showHint, setShowHint] = useState(false);

      // Shared Ref for SVG Canvas
      const svgRef = useRef(null);
      const autoNextTimeout = useRef(null); // Auto-advance timeout

      // --- COMMON SVG GRID RENDERER ---
      const renderGrid = () => {
        const lines = [];
        for (let i = -gridSize / 2; i <= gridSize / 2; i++) {
          lines.push(
            <line key={`h${i}`} x1={0} y1={toSvgY(i)} x2={svgSize} y2={toSvgY(i)} stroke={i === 0 ? "#1f2937" : "#e5e7eb"} strokeWidth={i === 0 ? 2 : 1} />
          );
          lines.push(
            <line key={`v${i}`} x1={toSvgX(i)} y1={0} x2={toSvgX(i)} y2={svgSize} stroke={i === 0 ? "#1f2937" : "#e5e7eb"} strokeWidth={i === 0 ? 2 : 1} />
          );
          if (i !== 0 && i % 2 === 0) {
            lines.push(<text key={`lx${i}`} x={toSvgX(i) - 8} y={center + 20} fontSize="14" fill="#6b7280">{i}</text>);
            lines.push(<text key={`ly${i}`} x={center - 28} y={toSvgY(i) + 5} fontSize="14" fill="#6b7280">{i}</text>);
          }
        }
        return lines;
      };

      // ==========================================
      //               EXPLORER LOGIC
      // ==========================================

      useEffect(() => {
        if (mainView === 'explorer') {
          setTx(0); setTy(0); setRotationAngle(0); setReflectAxis('x'); setRotationDirection('ccw');
        }
      }, [explorerMode, mainView]);

      // --- DRAG COORDINATE HELPER ---
      const getSvgCoordinates = (e) => {
        const svg = svgRef.current;
        if (!svg) return { x: 0, y: 0 };
        const pt = svg.createSVGPoint();
        pt.x = e.clientX ?? (e.touches?.[0]?.clientX || 0);
        pt.y = e.clientY ?? (e.touches?.[0]?.clientY || 0);
        return pt.matrixTransform(svg.getScreenCTM().inverse());
      };

      const handleExplorerPointerDown = (id) => (e) => {
        e.stopPropagation();
        if (e.target.setPointerCapture) {
          try { e.target.setPointerCapture(e.pointerId); } catch(err) {}
        }
        setExplorerDraggingPoint(id);
      };

      const handleExplorerPointerMove = (e) => {
        if (!explorerDraggingPoint || !svgRef.current || mainView !== 'explorer') return;
        
        const { x: svgX, y: svgY } = getSvgCoordinates(e);

        let mathX = Math.round(toMathX(svgX));
        let mathY = Math.round(toMathY(svgY));

        mathX = Math.max(-gridSize/2, Math.min(gridSize/2, mathX));
        mathY = Math.max(-gridSize/2, Math.min(gridSize/2, mathY));

        setOriginalPoints(prev => prev.map(p => p.id === explorerDraggingPoint ? { ...p, x: mathX, y: mathY } : p));
      };

      const stopExplorerDrag = () => setExplorerDraggingPoint(null);

      const getTransformedPoints = () => {
        return originalPoints.map(p => {
          let nx = p.x; let ny = p.y;
          if (explorerMode === 'translation') {
            nx += tx; ny += ty;
          } else if (explorerMode === 'reflection') {
            if (reflectAxis === 'x') ny = -ny;
            else if (reflectAxis === 'y') nx = -nx;
            else if (reflectAxis === 'y=h') ny = 2 * reflectH - ny;
            else if (reflectAxis === 'x=k') nx = 2 * reflectK - nx;
          } else if (explorerMode === 'rotation') {
            const rad = (rotationAngle * Math.PI) / 180;
            if (rotationDirection === 'ccw') {
              nx = p.x * Math.cos(rad) - p.y * Math.sin(rad);
              ny = p.x * Math.sin(rad) + p.y * Math.cos(rad);
            } else {
              nx = p.x * Math.cos(rad) + p.y * Math.sin(rad);
              ny = -p.x * Math.sin(rad) + p.y * Math.cos(rad);
            }
          }
          return { 
            id: p.id + "'", 
            x: Math.abs(nx) < 1e-10 ? 0 : Number(nx.toFixed(2)), 
            y: Math.abs(ny) < 1e-10 ? 0 : Number(ny.toFixed(2)), 
            origX: p.x, origY: p.y 
          };
        });
      };

      const getTransformationRule = () => {
        if (explorerMode === 'translation') {
          const xStr = tx >= 0 ? `x + ${tx}` : `x - ${Math.abs(tx)}`;
          const yStr = ty >= 0 ? `y + ${ty}` : `y - ${Math.abs(ty)}`;
          return `(x, y) → (${xStr}, ${yStr})`;
        } else if (explorerMode === 'reflection') {
          if (reflectAxis === 'x') return '(x, y) → (x, -y)';
          if (reflectAxis === 'y') return '(x, y) → (-x, y)';
          if (reflectAxis === 'y=h') return `(x, y) → (x, ${2 * reflectH} - y)`;
          if (reflectAxis === 'x=k') return `(x, y) → (${2 * reflectK} - x, y)`;
        } else if (explorerMode === 'rotation') {
          if (rotationDirection === 'ccw') {
            return `(x, y) → (x·cos(${rotationAngle}°) - y·sin(${rotationAngle}°), x·sin(${rotationAngle}°) + y·cos(${rotationAngle}°))`;
          } else {
            return `(x, y) → (x·cos(${rotationAngle}°) + y·sin(${rotationAngle}°), -x·sin(${rotationAngle}°) + y·cos(${rotationAngle}°))`;
          }
        }
      };

      const getPolygonPoints = (pts) => pts.map(p => `${toSvgX(p.x)},${toSvgY(p.y)}`).join(' ');

      // ==========================================
      //                 QUIZ LOGIC
      // ==========================================

      const handleQuizPointerDown = (e) => {
        if (quizAppState !== 'playing' || mainView !== 'quiz') return;
        
        if (e.target.setPointerCapture) {
          try { e.target.setPointerCapture(e.pointerId); } catch(err) {}
        }
        
        const { x: svgX, y: svgY } = getSvgCoordinates(e);

        let mathX = Math.round(toMathX(svgX));
        let mathY = Math.round(toMathY(svgY));

        mathX = Math.max(-gridSize/2, Math.min(gridSize/2, mathX));
        mathY = Math.max(-gridSize/2, Math.min(gridSize/2, mathY));

        setGuessPoint({ x: mathX, y: mathY });
        setIsQuizDragging(true); 
      };

      const handleQuizPointerMove = (e) => {
        if (!isQuizDragging || !svgRef.current || quizAppState !== 'playing' || mainView !== 'quiz') return;
        
        const { x: svgX, y: svgY } = getSvgCoordinates(e);

        let mathX = Math.round(toMathX(svgX));
        let mathY = Math.round(toMathY(svgY));

        mathX = Math.max(-gridSize/2, Math.min(gridSize/2, mathX));
        mathY = Math.max(-gridSize/2, Math.min(gridSize/2, mathY));

        setGuessPoint({ x: mathX, y: mathY });
      };

      const stopQuizDrag = () => setIsQuizDragging(false);

      const startQuiz = (mode) => {
        if (!playerName.trim()) return;
        setQuizMode(mode); setScore(0); setAttempts(0);
        generateQuestion(mode);
      };

      const generateQuestion = (mode) => {
        if (autoNextTimeout.current) clearTimeout(autoNextTimeout.current);

        const types = ['translation', 'reflection', 'rotation'];
        const actualMode = mode === 'mixed' ? types[Math.floor(Math.random() * types.length)] : mode;
        
        let x = Math.floor(Math.random() * 13) - 6;
        let y = Math.floor(Math.random() * 13) - 6;
        if (x === 0 && y === 0) x = 2; 
        
        const origPoint = { x, y };
        let params = {};
        let correctPoint = { x, y };

        if (actualMode === 'translation') {
          let minTx = Math.max(-8, -10 - x);
          let maxTx = Math.min(8, 10 - x);
          params.tx = Math.floor(Math.random() * (maxTx - minTx + 1)) + minTx;

          let minTy = Math.max(-8, -10 - y);
          let maxTy = Math.min(8, 10 - y);
          params.ty = Math.floor(Math.random() * (maxTy - minTy + 1)) + minTy;

          if (params.tx === 0 && params.ty === 0) params.tx = maxTx > 0 ? 1 : -1; 
          
          correctPoint = { x: x + params.tx, y: y + params.ty };
        } else if (actualMode === 'reflection') {
          params.axis = Math.random() > 0.5 ? 'x' : 'y';
          correctPoint = { x: params.axis === 'y' ? -x : x, y: params.axis === 'x' ? -y : y };
        } else if (actualMode === 'rotation') {
          params.angle = [90, 180, 270][Math.floor(Math.random() * 3)];
          params.direction = Math.random() > 0.5 ? 'cw' : 'ccw';
          
          let rad = (params.angle * Math.PI) / 180;
          let nx, ny;
          if (params.direction === 'ccw') {
            nx = x * Math.cos(rad) - y * Math.sin(rad); ny = x * Math.sin(rad) + y * Math.cos(rad);
          } else {
            nx = x * Math.cos(rad) + y * Math.sin(rad); ny = -x * Math.sin(rad) + y * Math.cos(rad);
          }
          correctPoint = { x: Math.round(nx), y: Math.round(ny) };
        }

        setQuestion({ type: actualMode, origPoint, params, correctPoint });
        setGuessPoint({ x: 0, y: 0 });
        setQuizAppState('playing');
        setAnimStep(0);
        setShowHint(false);
      };

      const submitQuizAnswer = () => {
        const correct = guessPoint.x === question.correctPoint.x && guessPoint.y === question.correctPoint.y;
        setIsCorrect(correct);
        if (correct) {
          setScore(s => s + 1);
          autoNextTimeout.current = setTimeout(() => {
            generateQuestion(quizMode);
          }, 4000);
        }
        setAttempts(a => a + 1);
        setQuizAppState('feedback');
        setAnimStep(0); 
        
        if (question.type === 'translation') {
          setTimeout(() => setAnimStep(1), 50);    
          setTimeout(() => setAnimStep(2), 1050);  
        } else {
          setTimeout(() => setAnimStep(2), 50);    
        }
      };

      const getQuizInstructionText = () => {
        if (!question) return null;
        const { type, origPoint, params } = question;
        const pt = `(${origPoint.x}, ${origPoint.y})`;
        
        let instruction = "";
        if (type === 'translation') {
          const xDir = params.tx > 0 ? 'rightwards' : 'leftwards';
          const yDir = params.ty > 0 ? 'upwards' : 'downwards';
          const moves = [];
          if (params.tx !== 0) moves.push(`${Math.abs(params.tx)} units ${xDir}`);
          if (params.ty !== 0) moves.push(`${Math.abs(params.ty)} units ${yDir}`);
          instruction = `Find the image after a translation ${moves.join(' and ')}.`;
        } else if (type === 'reflection') {
          instruction = `Find the image after a reflection with respect to the ${params.axis}-axis.`;
        } else if (type === 'rotation') {
          const dir = params.direction === 'cw' ? 'clockwise' : 'anticlockwise';
          instruction = `Find the image after a ${dir} rotation about the origin through ${params.angle} degrees.`;
        }

        return (
          <div className="flex flex-col gap-2">
            <div className="text-blue-600 font-bold tracking-wide">Original Point: P{pt}</div>
            <div className="text-slate-800">{instruction}</div>
          </div>
        );
      };

      // ==========================================
      //                 RENDERERS
      // ==========================================

      // --- 1. EXPLORER RENDER ---
      const renderExplorer = () => {
        const transformedPoints = getTransformedPoints();

        return (
          <div className="flex-1 max-w-7xl mx-auto w-full p-4 md:p-6 flex flex-col lg:flex-row gap-6">
            <div className="w-full lg:w-1/3 flex flex-col gap-6">
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <h2 className="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                  <Icon name="Settings2" className="text-blue-600 w-5 h-5" /> Controls
                </h2>
                
                <div className="flex bg-slate-100 p-1 rounded-lg mb-6">
                  {['translation', 'reflection', 'rotation'].map((m) => (
                    <button
                      key={m} onClick={() => setExplorerMode(m)}
                      className={`flex-1 py-2 text-sm font-medium rounded-md transition-colors capitalize ${
                        explorerMode === m ? 'bg-white shadow-sm text-blue-700' : 'text-slate-600 hover:text-slate-900'
                      }`}
                    >
                      {m}
                    </button>
                  ))}
                </div>

                <div className="min-h-[200px]">
                  {explorerMode === 'translation' && (
                    <div className="space-y-4">
                      <div>
                        <label className="flex justify-between text-sm mb-1">
                          <span>X-Shift (Horizontal)</span><span className="font-mono text-blue-600 font-bold">{tx}</span>
                        </label>
                        <input type="range" min="-10" max="10" value={tx} onChange={(e) => setTx(Number(e.target.value))} className="w-full accent-blue-600"/>
                      </div>
                      <div>
                        <label className="flex justify-between text-sm mb-1">
                          <span>Y-Shift (Vertical)</span><span className="font-mono text-blue-600 font-bold">{ty}</span>
                        </label>
                        <input type="range" min="-10" max="10" value={ty} onChange={(e) => setTy(Number(e.target.value))} className="w-full accent-blue-600"/>
                      </div>
                    </div>
                  )}

                  {explorerMode === 'reflection' && (
                    <div className="space-y-4">
                      <div className="grid grid-cols-2 gap-2">
                        {[ { val: 'x', label: 'X-Axis' }, { val: 'y', label: 'Y-Axis' }, { val: 'y=h', label: 'Line y = h' }, { val: 'x=k', label: 'Line x = k' } ].map(opt => (
                          <button key={opt.val} onClick={() => setReflectAxis(opt.val)} className={`py-2 px-3 rounded-lg border text-sm font-medium transition-all ${ reflectAxis === opt.val ? 'border-blue-600 bg-blue-50 text-blue-700' : 'border-slate-200 hover:bg-slate-50' }`}>
                            {opt.label}
                          </button>
                        ))}
                      </div>
                      {reflectAxis === 'y=h' && (
                        <div className="pt-2">
                          <label className="flex justify-between text-sm mb-1"><span>Horizontal Line y = h</span><span className="font-mono text-blue-600 font-bold">h = {reflectH}</span></label>
                          <input type="range" min="-10" max="10" value={reflectH} onChange={(e) => setReflectH(Number(e.target.value))} className="w-full accent-blue-600"/>
                        </div>
                      )}
                      {reflectAxis === 'x=k' && (
                        <div className="pt-2">
                          <label className="flex justify-between text-sm mb-1"><span>Vertical Line x = k</span><span className="font-mono text-blue-600 font-bold">k = {reflectK}</span></label>
                          <input type="range" min="-10" max="10" value={reflectK} onChange={(e) => setReflectK(Number(e.target.value))} className="w-full accent-blue-600"/>
                        </div>
                      )}
                    </div>
                  )}

                  {explorerMode === 'rotation' && (
                    <div className="space-y-4">
                      <div className="flex bg-slate-100 p-1 rounded-lg">
                        <button onClick={() => setRotationDirection('ccw')} className={`flex-1 py-1.5 text-sm font-medium rounded-md ${ rotationDirection === 'ccw' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-600' }`}>Anti-Clockwise</button>
                        <button onClick={() => setRotationDirection('cw')} className={`flex-1 py-1.5 text-sm font-medium rounded-md ${ rotationDirection === 'cw' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-600' }`}>Clockwise</button>
                      </div>
                      <div className="flex gap-2">
                        {[90, 180, 270, 360].map(angle => (
                          <button key={angle} onClick={() => setRotationAngle(angle === 360 ? 0 : angle)} className="flex-1 py-1.5 rounded border border-slate-200 hover:bg-slate-50 text-sm">{angle}°</button>
                        ))}
                      </div>
                      <div className="pt-2">
                        <label className="flex justify-between text-sm mb-1"><span>Angle (Degrees)</span><span className="font-mono text-blue-600 font-bold">{rotationAngle}°</span></label>
                        <input type="range" min="0" max="360" value={rotationAngle} onChange={(e) => setRotationAngle(Number(e.target.value))} className="w-full accent-blue-600"/>
                      </div>
                    </div>
                  )}
                </div>
              </div>

              <div className="bg-slate-800 text-white p-5 rounded-xl shadow-lg relative overflow-hidden flex-1">
                <h4 className="text-slate-400 text-xs font-bold uppercase tracking-wider mb-2">Mathematical Rule</h4>
                <div className="text-xl md:text-2xl font-mono bg-slate-900/50 p-3 rounded-lg border border-slate-700 mb-4 break-words">
                  {getTransformationRule()}
                </div>
                <table className="w-full text-sm md:text-base text-left">
                  <thead>
                    <tr className="text-slate-400 border-b border-slate-700"><th className="pb-2">Point</th><th className="pb-2">Original (x,y)</th><th className="pb-2">New (x',y')</th></tr>
                  </thead>
                  <tbody className="font-mono">
                    {transformedPoints.map((p, i) => (
                      <tr key={p.id} className="border-b border-slate-700/50 last:border-0">
                        <td className="py-2 text-blue-300">{originalPoints[i].id} → {p.id}</td>
                        <td className="py-2 text-slate-300">({p.origX}, {p.origY})</td>
                        <td className="py-2 text-orange-400 font-bold">({p.x}, {p.y})</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            <div className="w-full lg:w-2/3 flex items-center justify-center bg-white rounded-xl shadow-sm border border-slate-200 p-4 relative" style={{ touchAction: 'none' }}>
              <svg 
                ref={svgRef} width="100%" height="100%" viewBox={`0 0 ${svgSize} ${svgSize}`} className="max-h-[75vh]"
                onPointerMove={handleExplorerPointerMove} 
                onPointerUp={stopExplorerDrag} 
                onPointerLeave={stopExplorerDrag}
              >
                {renderGrid()}
                
                {explorerMode === 'reflection' && (
                  <g className="transition-all duration-500 opacity-50">
                    {reflectAxis === 'x' && <line x1={0} y1={center} x2={svgSize} y2={center} stroke="#eab308" strokeWidth="8" strokeDasharray="16 8" />}
                    {reflectAxis === 'y' && <line x1={center} y1={0} x2={center} y2={svgSize} stroke="#eab308" strokeWidth="8" strokeDasharray="16 8" />}
                    {reflectAxis === 'y=h' && <line x1={0} y1={toSvgY(reflectH)} x2={svgSize} y2={toSvgY(reflectH)} stroke="#eab308" strokeWidth="8" strokeDasharray="16 8" />}
                    {reflectAxis === 'x=k' && <line x1={toSvgX(reflectK)} y1={0} x2={toSvgX(reflectK)} y2={svgSize} stroke="#eab308" strokeWidth="8" strokeDasharray="16 8" />}
                  </g>
                )}

                {transformedPoints.map((p, i) => {
                  const orig = originalPoints[i];
                  if (Math.abs(p.x - orig.x) > 0.01 || Math.abs(p.y - orig.y) > 0.01) {
                    return <line key={`line-${p.id}`} x1={toSvgX(orig.x)} y1={toSvgY(orig.y)} x2={toSvgX(p.x)} y2={toSvgY(p.y)} stroke="#94a3b8" strokeWidth="1" strokeDasharray="3 3" className="opacity-40" />;
                  }
                  return null;
                })}

                <polygon points={getPolygonPoints(transformedPoints)} fill="rgba(249, 115, 22, 0.3)" stroke="#f97316" strokeWidth="3" strokeDasharray="6 6" />
                {transformedPoints.map(p => (
                  <g key={p.id}>
                    <circle cx={toSvgX(p.x)} cy={toSvgY(p.y)} r="7" fill="#ea580c" />
                    <text x={toSvgX(p.x) + 12} y={toSvgY(p.y) - 12} fontSize="20" fontWeight="bold" fill="#ea580c">{p.id}</text>
                  </g>
                ))}

                <polygon points={getPolygonPoints(originalPoints)} fill="rgba(59, 130, 246, 0.2)" stroke="#3b82f6" strokeWidth="2" />
                {originalPoints.map(p => (
                  <g key={p.id} onPointerDown={handleExplorerPointerDown(p.id)} style={{ cursor: explorerDraggingPoint === p.id ? 'grabbing' : 'grab' }}>
                    <circle cx={toSvgX(p.x)} cy={toSvgY(p.y)} r="28" fill="transparent" />
                    <circle cx={toSvgX(p.x)} cy={toSvgY(p.y)} r={explorerDraggingPoint === p.id ? "10" : "7"} fill="#1d4ed8" className="transition-all duration-200" />
                    <text x={toSvgX(p.x) + 14} y={toSvgY(p.y) - 14} fontSize="20" fontWeight="bold" fill="#1d4ed8" style={{ pointerEvents: 'none' }}>{p.id}</text>
                  </g>
                ))}
              </svg>
            </div>
          </div>
        );
      };

      // --- 2. QUIZ RENDER ---
      const renderQuiz = () => {
        if (quizAppState === 'intro') {
          return (
            <div className="flex-1 flex items-center justify-center p-4 w-full">
              <div className="bg-white p-8 rounded-2xl shadow-lg max-w-lg w-full border border-slate-200">
                <div className="text-center mb-8">
                  <div className="inline-flex items-center justify-center p-4 bg-orange-100 rounded-full mb-4">
                    <Icon name="GraduationCap" className="w-10 h-10 text-orange-600" />
                  </div>
                  <h2 className="text-3xl font-bold text-slate-900 mb-2">Quiz Mode</h2>
                  <p className="text-slate-500">Test your skills in translating, reflecting, and rotating points.</p>
                </div>
                <div className="space-y-6">
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-2">Enter your name:</label>
                    <div className="relative">
                      <Icon name="User" className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5" />
                      <input type="text" value={playerName} onChange={(e) => setPlayerName(e.target.value)} className="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-shadow outline-none" placeholder="Your Name" />
                    </div>
                  </div>
                  <div className="pt-2">
                    <h3 className="text-sm font-medium text-slate-700 mb-3">Select Quiz Focus:</h3>
                    <div className="grid grid-cols-2 gap-3">
                      <button disabled={!playerName.trim()} onClick={() => startQuiz('translation')} className="flex flex-col items-center gap-2 p-4 rounded-xl border border-slate-200 hover:border-orange-500 hover:bg-orange-50 disabled:opacity-50 disabled:hover:bg-transparent transition-all text-slate-700">
                        <Icon name="Move" className="w-6 h-6 text-blue-500" /> <span className="font-medium">Translation</span>
                      </button>
                      <button disabled={!playerName.trim()} onClick={() => startQuiz('reflection')} className="flex flex-col items-center gap-2 p-4 rounded-xl border border-slate-200 hover:border-orange-500 hover:bg-orange-50 disabled:opacity-50 disabled:hover:bg-transparent transition-all text-slate-700">
                        <Icon name="FlipHorizontal" className="w-6 h-6 text-emerald-500" /> <span className="font-medium">Reflection</span>
                      </button>
                      <button disabled={!playerName.trim()} onClick={() => startQuiz('rotation')} className="flex flex-col items-center gap-2 p-4 rounded-xl border border-slate-200 hover:border-orange-500 hover:bg-orange-50 disabled:opacity-50 disabled:hover:bg-transparent transition-all text-slate-700">
                        <Icon name="RotateCcw" className="w-6 h-6 text-purple-500" /> <span className="font-medium">Rotation</span>
                      </button>
                      <button disabled={!playerName.trim()} onClick={() => startQuiz('mixed')} className="flex flex-col items-center gap-2 p-4 rounded-xl border border-slate-200 hover:border-orange-500 hover:bg-orange-50 disabled:opacity-50 disabled:hover:bg-transparent transition-all text-slate-700">
                        <Icon name="Shuffle" className="w-6 h-6 text-orange-500" /> <span className="font-medium">Mixed Mode</span>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        return (
          <div className="flex-1 max-w-7xl mx-auto w-full p-4 md:p-6 flex flex-col lg:flex-row gap-6">
            <div className="w-full lg:w-1/3 flex flex-col gap-6">
              
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 flex flex-col gap-4">
                 <div className="flex justify-between items-center border-b border-slate-100 pb-3">
                    <div className="flex items-center gap-2 font-bold text-slate-800"><Icon name="User" className="w-4 h-4 text-orange-600" /> {playerName}</div>
                    <div className="flex items-center gap-2 font-bold text-lg">
                      <Icon name="Trophy" className="w-5 h-5 text-yellow-500" /> <span className="text-orange-600">{score}</span><span className="text-slate-400 text-sm">/ {attempts}</span>
                    </div>
                 </div>
                 <div className="flex justify-between items-center text-sm">
                    <span className="px-2 py-1 bg-slate-100 text-slate-600 rounded-md uppercase tracking-wider font-semibold">{quizMode} Mode</span>
                    <button 
                      onClick={() => {
                        if (autoNextTimeout.current) clearTimeout(autoNextTimeout.current);
                        setQuizAppState('intro');
                      }} 
                      className="text-slate-500 hover:text-slate-800 font-medium flex items-center gap-1 bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-200 hover:bg-slate-100 transition-colors"
                    >
                      ← Exit Quiz
                    </button>
                 </div>
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex-1">
                <h2 className="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">Question {attempts + 1}</h2>
                <div className="text-2xl font-medium text-slate-800 leading-snug mb-6">{getQuizInstructionText()}</div>
                
                <div className="bg-orange-50 p-4 rounded-lg border border-orange-100 flex items-start gap-3 mb-6">
                  <Icon name="Info" className="w-5 h-5 text-orange-600 shrink-0 mt-0.5" />
                  <p className="text-sm text-orange-800">
                    <span className="font-bold">Click</span> anywhere on the grid or <span className="font-bold">drag</span> the orange point to the correct location!
                  </p>
                </div>

                {quizAppState === 'playing' && (question?.type === 'reflection' || question?.type === 'rotation') && (
                  <div className="mb-6">
                    <button 
                      onClick={() => setShowHint(true)}
                      disabled={showHint}
                      className={`flex items-center gap-2 px-4 py-3 text-sm font-bold rounded-xl transition-all w-full justify-center ${
                        showHint 
                          ? 'bg-slate-100 text-slate-400 cursor-not-allowed border border-slate-200' 
                          : 'bg-yellow-50 text-yellow-700 hover:bg-yellow-100 border border-yellow-300 shadow-sm'
                      }`}
                    >
                      <Icon name="Lightbulb" className="w-5 h-5" /> 
                      {showHint 
                        ? `Hint: ${question.type === 'reflection' ? 'Reflection Axis' : 'Reference Rectangle'} is shown on the grid` 
                        : `Need a Hint? Show ${question.type === 'reflection' ? 'Axis' : 'Rectangle'}`
                      }
                    </button>
                  </div>
                )}

                {quizAppState === 'playing' ? (
                  <button onClick={submitQuizAnswer} className="w-full py-4 bg-orange-600 hover:bg-orange-700 text-white rounded-xl font-bold text-lg shadow-md transition-colors">
                    Submit Answer
                  </button>
                ) : (
                  <div className="space-y-4">
                    <div className={`p-4 rounded-xl flex items-start gap-3 ${isCorrect ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200'}`}>
                      {isCorrect ? <Icon name="CheckCircle2" className="w-6 h-6 text-green-600 shrink-0" /> : <Icon name="XCircle" className="w-6 h-6 text-red-600 shrink-0" />}
                      <div>
                        <h3 className={`font-bold ${isCorrect ? 'text-green-800' : 'text-red-800'}`}>{isCorrect ? 'Correct!' : 'Incorrect'}</h3>
                        {isCorrect && <p className="text-sm mt-1 text-green-700">Auto-advancing to next question...</p>}
                        {!isCorrect && <p className={`text-sm mt-1 ${isCorrect ? 'text-green-700' : 'text-red-700'}`}>The correct location is ({question.correctPoint.x}, {question.correctPoint.y}).</p>}
                      </div>
                    </div>
                    <button onClick={() => generateQuestion(quizMode)} className="w-full py-4 bg-slate-800 hover:bg-slate-900 text-white rounded-xl font-bold text-lg shadow-md transition-colors flex justify-center items-center gap-2">
                      Next Question <Icon name="ArrowRight" className="w-5 h-5" />
                    </button>
                  </div>
                )}
              </div>
            </div>

            <div className="w-full lg:w-2/3 flex items-center justify-center bg-white rounded-xl shadow-sm border border-slate-200 p-4 relative" style={{ touchAction: 'none' }}>
              <svg 
                ref={svgRef} width="100%" height="100%" viewBox={`0 0 ${svgSize} ${svgSize}`} 
                className="max-h-[75vh]"
                style={{ cursor: quizAppState === 'playing' ? (isQuizDragging ? 'grabbing' : 'crosshair') : 'default' }}
                onPointerDown={handleQuizPointerDown}
                onPointerMove={handleQuizPointerMove} 
                onPointerUp={stopQuizDrag} 
                onPointerLeave={stopQuizDrag}
              >
                {renderGrid()}
                {question && (
                  <g>
                    <circle cx={toSvgX(question.origPoint.x)} cy={toSvgY(question.origPoint.y)} r="8" fill="#2563eb" />
                    <text x={toSvgX(question.origPoint.x) + 12} y={toSvgY(question.origPoint.y) - 12} fontSize="22" fontWeight="bold" fill="#2563eb">P</text>
                  </g>
                )}
                
                {question && question.type === 'reflection' && (
                  <line
                    x1={question.params.axis === 'x' ? 0 : center} y1={question.params.axis === 'x' ? center : 0}
                    x2={question.params.axis === 'x' ? svgSize : center} y2={question.params.axis === 'x' ? center : svgSize}
                    stroke="#eab308" strokeWidth="8" strokeDasharray="16 8" 
                    opacity={(quizAppState === 'playing' && showHint) || (quizAppState === 'feedback' && animStep >= 2) ? 0.7 : 0}
                    className="transition-opacity duration-1000"
                    style={{ pointerEvents: 'none' }}
                  />
                )}

                {question && question.type === 'rotation' && (
                  <polygon
                    points={`${center},${center} ${toSvgX(question.origPoint.x)},${center} ${toSvgX(question.origPoint.x)},${toSvgY(question.origPoint.y)} ${center},${toSvgY(question.origPoint.y)}`}
                    fill="rgba(234, 179, 8, 0.1)"
                    stroke="#eab308" strokeWidth="3" strokeDasharray="8 4"
                    opacity={quizAppState === 'playing' && showHint ? 0.7 : 0}
                    className="transition-opacity duration-1000"
                    style={{ pointerEvents: 'none' }}
                  />
                )}

                {quizAppState === 'feedback' && question && (
                  <g>
                    {question.type === 'reflection' && (
                      <line
                        x1={question.params.axis === 'x' ? 0 : center} y1={question.params.axis === 'x' ? center : 0}
                        x2={question.params.axis === 'x' ? svgSize : center} y2={question.params.axis === 'x' ? center : svgSize}
                        stroke="#eab308" strokeWidth="8" strokeDasharray="16 8" opacity={animStep >= 2 ? 0.4 : 0}
                        className="transition-opacity duration-1000"
                      />
                    )}
                    {question.type === 'rotation' && (
                      <circle
                        cx={center} cy={center}
                        r={Math.sqrt(Math.pow(toSvgX(question.origPoint.x) - center, 2) + Math.pow(toSvgY(question.origPoint.y) - center, 2))}
                        stroke="#eab308" strokeWidth="2" strokeDasharray="6 6" fill="none" opacity={animStep >= 2 ? 0.3 : 0}
                        className="transition-opacity duration-1000"
                      />
                    )}

                    {question.type === 'translation' && (
                      <React.Fragment>
                        <line 
                          x1={toSvgX(question.origPoint.x)} y1={toSvgY(question.origPoint.y)} 
                          x2={toSvgX(question.correctPoint.x)} y2={toSvgY(question.origPoint.y)} 
                          stroke="#16a34a" strokeWidth="2" strokeDasharray="4 4" 
                          opacity={animStep >= 1 ? 0.3 : 0} 
                          className="transition-opacity duration-500"
                        />
                        <line 
                          x1={toSvgX(question.correctPoint.x)} y1={toSvgY(question.origPoint.y)} 
                          x2={toSvgX(question.correctPoint.x)} y2={toSvgY(question.correctPoint.y)} 
                          stroke="#16a34a" strokeWidth="2" strokeDasharray="4 4" 
                          opacity={animStep >= 2 ? 0.3 : 0} 
                          className="transition-opacity duration-500"
                        />
                      </React.Fragment>
                    )}
                    {question.type === 'reflection' && (
                      <line 
                        x1={toSvgX(question.origPoint.x)} y1={toSvgY(question.origPoint.y)} 
                        x2={toSvgX(question.correctPoint.x)} y2={toSvgY(question.correctPoint.y)} 
                        stroke="#16a34a" strokeWidth="2" strokeDasharray="4 4" 
                        opacity={animStep >= 2 ? 0.3 : 0} 
                        className="transition-opacity duration-1000"
                      />
                    )}

                    <circle 
                      cx={toSvgX(question.correctPoint.x)} cy={toSvgY(question.correctPoint.y)} 
                      r="12" fill="none" stroke="#16a34a" strokeWidth="3" 
                      opacity={animStep >= 2 ? 0.5 : 0} 
                      className="transition-opacity duration-1000 delay-300" 
                    />
                    
                    {question.type !== 'rotation' ? (
                      <g 
                        className="transition-all duration-1000 ease-in-out" 
                        style={{ 
                          transform: `translate(${
                            animStep >= 1 ? toSvgX(question.correctPoint.x) : toSvgX(question.origPoint.x)
                          }px, ${
                            animStep >= 2 ? toSvgY(question.correctPoint.y) : toSvgY(question.origPoint.y)
                          }px)` 
                        }}
                      >
                        <circle cx={0} cy={0} r="6" fill="#16a34a" />
                        <text x={12} y={-12} fontSize="20" fontWeight="bold" fill="#16a34a">
                          {isCorrect ? "Correct!" : "Correct P'"}
                        </text>
                      </g>
                    ) : (
                      <g 
                        className="transition-all duration-1000 ease-in-out"
                        style={{
                          transformOrigin: `${center}px ${center}px`,
                          transform: `rotate(${animStep >= 2 ? (question.params.direction === 'cw' ? question.params.angle : -question.params.angle) : 0}deg)`
                        }}
                      >
                        <polygon
                          points={`${center},${center} ${toSvgX(question.origPoint.x)},${center} ${toSvgX(question.origPoint.x)},${toSvgY(question.origPoint.y)} ${center},${toSvgY(question.origPoint.y)}`}
                          fill="rgba(22, 163, 74, 0.1)"
                          stroke="#16a34a"
                          strokeWidth="2"
                          strokeDasharray="4 4"
                        />
                        <circle cx={toSvgX(question.origPoint.x)} cy={toSvgY(question.origPoint.y)} r="6" fill="#16a34a" />
                        <text x={toSvgX(question.origPoint.x) + 12} y={toSvgY(question.origPoint.y) - 12} fontSize="20" fontWeight="bold" fill="#16a34a">
                          {isCorrect ? "Correct!" : "Correct P'"}
                        </text>
                      </g>
                    )}
                  </g>
                )}
                
                <g style={{ pointerEvents: 'none' }}>
                  <circle cx={toSvgX(guessPoint.x)} cy={toSvgY(guessPoint.y)} r="36" fill="transparent" />
                  <circle cx={toSvgX(guessPoint.x)} cy={toSvgY(guessPoint.y)} r={isQuizDragging ? "20" : "14"} fill="none" stroke="#ea580c" strokeWidth="3" className="transition-all duration-200" />
                  <circle cx={toSvgX(guessPoint.x)} cy={toSvgY(guessPoint.y)} r="8" fill="#ea580c" />
                  <text x={toSvgX(guessPoint.x) + 18} y={toSvgY(guessPoint.y) + 24} fontSize="24" fontWeight="bold" fill="#ea580c">P'</text>
                </g>
              </svg>
            </div>
          </div>
        );
      };

      // --- APP LAYOUT ---
      return (
        <div className="min-h-screen bg-slate-50 flex flex-col font-sans">
          <header className="bg-white border-b border-slate-200 px-4 py-3 shadow-sm sticky top-0 z-10 flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 className="text-xl font-bold text-slate-800 flex items-center gap-2">
               Transformations on a Rectangular Coordinate Plane 
            </h1>
            <div className="flex bg-slate-100 p-1 rounded-lg">
              <button 
                onClick={() => setMainView('explorer')}
                className={`flex items-center gap-2 px-4 py-2 text-sm font-bold rounded-md transition-all ${
                  mainView === 'explorer' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-500 hover:text-slate-800'
                }`}
              >
                <Icon name="Compass" className="w-4 h-4" /> Explorer Mode
              </button>
              <button 
                onClick={() => setMainView('quiz')}
                className={`flex items-center gap-2 px-4 py-2 text-sm font-bold rounded-md transition-all ${
                  mainView === 'quiz' ? 'bg-white shadow-sm text-orange-600' : 'text-slate-500 hover:text-slate-800'
                }`}
              >
                <Icon name="GraduationCap" className="w-4 h-4" /> Quiz Mode
              </button>
            </div>
          </header>

          {mainView === 'explorer' ? renderExplorer() : renderQuiz()}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CoordinateTransformations />);
  </script>
</body>
</html>
